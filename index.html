<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>もふもふクイズ</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-bg: #FFE5E5;
            --card-bg: #FFFFFF;
            --text-main: #5D4037;
            --btn-yellow: #FFCA28;
            --btn-blue: #29B6F6;
            --btn-green: #66BB6A;
            --btn-pink: #EC407A;
            --shadow-color: rgba(93, 64, 55, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-bg);
            background-image: radial-gradient(#FFCDD2 3px, transparent 3px);
            background-size: 40px 40px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 15px;
        }

        #app {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 40px;
            box-shadow: 0 15px 35px var(--shadow-color);
            padding: 40px 25px;
            text-align: center;
            position: relative;
            border: 4px solid #FFF;
            max-height: 95vh;
            overflow-y: auto;
        }

        #app::-webkit-scrollbar {
            display: none;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: block;
        }

        .title {
            font-size: 3.2rem;
            color: var(--btn-pink);
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 3px 3px 0px #FFF, 6px 6px 0px rgba(0,0,0,0.05);
        }

        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #8D6E63;
        }

        .hero-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 8px solid var(--btn-yellow);
            margin-bottom: 25px;
            box-shadow: 0 10px 20px var(--shadow-color);
        }

        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .start-btn {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 900;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        .btn-animal {
            background-color: var(--btn-yellow);
            box-shadow: 0 8px 0 #F57F17, 0 15px 20px rgba(245, 127, 23, 0.4);
        }
        .btn-animal:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #F57F17, 0 5px 10px rgba(245, 127, 23, 0.4);
        }

        .btn-dog {
            background-color: var(--btn-blue);
            box-shadow: 0 8px 0 #0288D1, 0 15px 20px rgba(2, 136, 209, 0.4);
        }
        .btn-dog:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #0288D1, 0 5px 10px rgba(2, 136, 209, 0.4);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            gap: 10px;
        }

        .question-number {
            background-color: var(--btn-yellow);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 0 #F57F17;
        }

        .score-display {
            color: var(--btn-pink);
            background-color: #FCE4EC;
            padding: 8px 15px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .animal-img-container {
            width: 100%;
            height: 240px;
            margin-bottom: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px var(--shadow-color);
            background-color: #F5F5F5;
            position: relative;
            border: 4px solid #FFF;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #BCAAA4;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1;
        }

        .error-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #E53935;
            font-size: 1rem;
            font-weight: bold;
            z-index: 1;
            display: none;
            width: 100%;
            text-align: center;
        }

        .animal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        .animal-img.loaded {
            opacity: 1;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            font-size: 1.1rem;
            font-weight: 900;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s, background-color 0.3s;
            position: relative;
            overflow: hidden;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            min-height: 70px;
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15) !important;
        }

        .option-btn:nth-child(1) { background-color: var(--btn-blue); box-shadow: 0 8px 0 #0288D1; }
        .option-btn:nth-child(2) { background-color: var(--btn-green); box-shadow: 0 8px 0 #388E3C; }
        .option-btn:nth-child(3) { background-color: var(--btn-yellow); box-shadow: 0 8px 0 #F57F17; }
        .option-btn:nth-child(4) { background-color: var(--btn-pink); box-shadow: 0 8px 0 #C2185B; }

        .correct-highlight {
            animation: correctPulse 1s infinite;
            z-index: 10;
        }

        .wrong-highlight {
            opacity: 0.5;
            transform: scale(0.95);
            box-shadow: 0 4px 0 rgba(0,0,0,0.15) !important;
        }

        .result-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--btn-blue);
        }

        .final-score {
            font-size: 5rem;
            color: var(--btn-pink);
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #FFF;
        }

        .result-msg {
            font-size: 1.3rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-btn {
            background-color: var(--btn-green);
            box-shadow: 0 8px 0 #388E3C, 0 15px 20px rgba(56, 142, 60, 0.4);
            margin: 0 auto;
        }
        .back-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #388E3C, 0 5px 10px rgba(56, 142, 60, 0.4);
        }

        #feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 100;
            visibility: hidden;
        }

        .feedback-mark {
            font-size: 15rem;
            font-weight: bold;
            opacity: 0;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            line-height: 1;
        }

        .feedback-mark.correct {
            color: #FF5252;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .feedback-mark.wrong {
            color: #424242;
            animation: dropShake 1s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.3) rotate(-20deg); }
            40% { opacity: 1; transform: scale(1.2) rotate(10deg); }
            80% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(1); }
        }

        @keyframes dropShake {
            0% { opacity: 0; transform: scale(1.5) translateY(-50px); }
            20% { opacity: 1; transform: scale(1) translateY(0); }
            40% { transform: translateX(-20px) rotate(-10deg); }
            60% { transform: translateX(20px) rotate(10deg); }
            80% { transform: translateX(-10px) rotate(-5deg); }
            100% { opacity: 0; transform: translateX(0) rotate(0); }
        }

        @keyframes correctPulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        /* ローディング画面 */
        #loading-screen {
            display: none;
        }
        #loading-screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            min-height: 300px;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #FCE4EC;
            border-top: 6px solid var(--btn-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-label {
            font-size: 1.3rem;
            color: var(--btn-pink);
            font-weight: 900;
        }

        @media (max-width: 480px) {
            .title { font-size: 2.8rem; }
            .hero-img { width: 150px; height: 150px; margin-bottom: 20px; }
            .animal-img-container { height: 200px; }
            .option-btn { font-size: 1rem; padding: 8px 5px; min-height: 60px; }
            .header { font-size: 1rem; }
            .start-btn { font-size: 1.1rem; padding: 12px 20px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="start-screen" class="screen active">
            <h1 class="title">もふもふ<br>クイズ</h1>
            <p class="subtitle">しゃしんをみて なまえを あててね！<br>ぜんぶで 10もん あるよ🐾</p>

            <img id="hero-img" src="" alt="もふもふアルパカ" class="hero-img" style="display:none;">

            <div class="mode-select">
                <button class="start-btn btn-animal" onclick="startGame('animal')">
                    🐼 どうぶつ
                </button>
                <button class="start-btn btn-dog" onclick="startGame('dog')">
                    🐶 いぬのしゅるい
                </button>
            </div>
        </div>

        <div id="loading-screen" class="screen">
            <div class="loading-spinner"></div>
            <div class="loading-label">しゃしんを よみこんでるよ...🐾</div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="question-number" id="question-number-label">だい いち もん</div>
                <div class="score-display">スコア: <span id="score">0</span></div>
            </div>

            <div class="animal-img-container">
                <div id="loading-text" class="loading-text">しゃしんを<br>よみこみちゅう...</div>
                <div id="error-text" class="error-text">しゃしんが でないよ<br>もういちど やってみてね</div>
                <img id="question-img" class="animal-img" src="" alt="クイズのしゃしん">
            </div>

            <div class="options" id="options-container"></div>
        </div>

        <div id="result-screen" class="screen">
            <h2 class="result-title">けっかは...</h2>
            <div class="final-score" id="final-score-text">0 / 10</div>
            <p class="result-msg" id="result-message">がんばったね！</p>
            <button class="start-btn back-btn" onclick="goToStart()">さいしょに もどる</button>
        </div>
    </div>

    <div id="feedback-overlay">
        <div id="feedback-mark" class="feedback-mark"></div>
    </div>

    <script>
        /*
         * 修正内容:
         * ハードコードされたWikimedia画像URLはファイル名の大文字小文字の違いや
         * ファイルの移動・削除により表示されないケースが多数ありました。
         *
         * Wikipedia REST API (page/summary) を使い、各動物・犬種の
         * Wikipediaページからサムネイル画像URLを動的に取得する方式に変更。
         * これにより、Wikimediaのファイル名変更に左右されず、
         * 常に最新の有効な画像が表示されます。
         */

        const animalData = [
            { name: "あるぱか", wiki: "Alpaca", img: "" },
            { name: "れっさーぱんだ", wiki: "Red_panda", img: "" },
            { name: "じゃいあんとぱんだ", wiki: "Giant_panda", img: "" },
            { name: "らっこ", wiki: "Sea_otter", img: "" },
            { name: "たてごとあざらし", wiki: "Harp_seal", img: "" },
            { name: "かぴばら", wiki: "Capybara", img: "" },
            { name: "はりねずみ", wiki: "Hedgehog", img: "" },
            { name: "ももんが", wiki: "Japanese_dwarf_flying_squirrel", img: "" },
            { name: "やく", wiki: "Domestic_yak", img: "" },
            { name: "ぺるしゃねこ", wiki: "Persian_cat", img: "" },
            { name: "ねこ", wiki: "Cat", img: "" },
            { name: "うさぎ", wiki: "Rabbit", img: "" },
            { name: "もるもっと", wiki: "Guinea_pig", img: "" },
            { name: "りす", wiki: "Red_squirrel", img: "" }
        ];

        const dogData = [
            { name: "しばいぬ", wiki: "Shiba_Inu", img: "" },
            { name: "といぷーどる", wiki: "Poodle", img: "" },
            { name: "こーぎー", wiki: "Pembroke_Welsh_Corgi", img: "" },
            { name: "しべりあんはすきー", wiki: "Siberian_Husky", img: "" },
            { name: "さもえど", wiki: "Samoyed_dog", img: "" },
            { name: "ごーるでんれとりばー", wiki: "Golden_Retriever", img: "" },
            { name: "らぶらどーる", wiki: "Labrador_Retriever", img: "" },
            { name: "だっくすふんど", wiki: "Dachshund", img: "" },
            { name: "ぽめらにあん", wiki: "Pomeranian_dog", img: "" },
            { name: "ふれんちぶるどっぐ", wiki: "French_Bulldog", img: "" },
            { name: "まるちーず", wiki: "Maltese_dog", img: "" },
            { name: "ぱぐ", wiki: "Pug", img: "" },
            { name: "ちわわ", wiki: "Chihuahua_(dog)", img: "" },
            { name: "びーぐる", wiki: "Beagle", img: "" },
            { name: "だるめしあん", wiki: "Dalmatian_dog", img: "" },
            { name: "せんとばーなーど", wiki: "St._Bernard_(dog)", img: "" },
            { name: "あきたけん", wiki: "Akita_(dog)", img: "" },
            { name: "よーくしゃーてりあ", wiki: "Yorkshire_Terrier", img: "" },
            { name: "びしょんふりーぜ", wiki: "Bichon_Frise", img: "" },
            { name: "ぼーだーこりー", wiki: "Border_Collie", img: "" }
        ];

        let currentDataset = [];
        let quizList = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnimating = false;

        const kanjiNumbers = ['いち', 'に', 'さん', 'よん', 'ご', 'ろく', 'なな', 'はち', 'きゅう', 'じゅう'];

        // --- 画像取得: Wikipedia REST API ---

        async function fetchWikiImage(title) {
            try {
                const url = 'https://en.wikipedia.org/api/rest_v1/page/summary/'
                    + encodeURIComponent(title);
                const res = await fetch(url);
                if (!res.ok) throw new Error('API error: ' + res.status);
                const data = await res.json();

                // originalimage があればそのURLのサムネ幅を600pxに変更して使用
                if (data.originalimage && data.originalimage.source) {
                    const src = data.originalimage.source;
                    // Wikimedia thumbURL形式ならサイズ変更、そうでなければそのまま
                    if (src.includes('/commons/')) {
                        // オリジナル画像のthumb URLを生成
                        const filename = src.split('/').pop();
                        const pathParts = src.match(/(.*\/commons\/)(.*)/);
                        if (pathParts) {
                            return src.replace('/commons/', '/commons/thumb/')
                                .replace(new RegExp(filename + '$'), filename + '/600px-' + filename);
                        }
                    }
                    return src;
                }

                // thumbnailがあればサイズを大きくして使用
                if (data.thumbnail && data.thumbnail.source) {
                    return data.thumbnail.source.replace(/\/\d+px-/, '/600px-');
                }

                return '';
            } catch (e) {
                console.warn('画像取得失敗:', title, e);
                return '';
            }
        }

        async function loadImages(dataset) {
            const promises = dataset.map(async (item) => {
                if (!item.img) {
                    item.img = await fetchWikiImage(item.wiki);
                }
            });
            await Promise.all(promises);
        }

        // トップ画面のヒーロー画像
        async function loadHeroImage() {
            const heroUrl = await fetchWikiImage('Alpaca');
            if (heroUrl) {
                const heroImg = document.getElementById('hero-img');
                heroImg.onload = () => { heroImg.style.display = 'block'; };
                heroImg.onerror = () => { heroImg.style.display = 'none'; };
                heroImg.src = heroUrl;
            }
        }

        // --- 画面切替 ---

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // --- ユーティリティ ---

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateOptions(correctName, fullData) {
            const options = [correctName];
            const others = shuffleArray(fullData.filter(item => item.name !== correctName));
            for (let i = 0; i < others.length && options.length < 4; i++) {
                if (!options.includes(others[i].name)) {
                    options.push(others[i].name);
                }
            }
            return shuffleArray(options);
        }

        // --- クイズ進行 ---

        function updateQuestionNumber() {
            const label = document.getElementById('question-number-label');
            label.textContent = `だい ${kanjiNumbers[currentQuestionIndex]} もん`;
        }

        function resetImageState() {
            const img = document.getElementById('question-img');
            const loadingText = document.getElementById('loading-text');
            const errorText = document.getElementById('error-text');
            img.classList.remove('loaded');
            img.style.display = 'block';
            loadingText.style.display = 'block';
            errorText.style.display = 'none';
        }

        function showQuestion() {
            if (currentQuestionIndex >= quizList.length) {
                showResult();
                return;
            }

            isAnimating = false;
            updateQuestionNumber();

            const question = quizList[currentQuestionIndex];
            const img = document.getElementById('question-img');
            const loadingText = document.getElementById('loading-text');
            const errorText = document.getElementById('error-text');
            const optionsContainer = document.getElementById('options-container');

            resetImageState();
            optionsContainer.innerHTML = '';

            const options = generateOptions(question.name, currentDataset);
            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.onclick = () => selectAnswer(option, question.name);
                optionsContainer.appendChild(button);
            });

            img.onload = () => {
                loadingText.style.display = 'none';
                errorText.style.display = 'none';
                img.classList.add('loaded');
            };

            img.onerror = () => {
                loadingText.style.display = 'none';
                errorText.style.display = 'block';
                img.style.display = 'none';
            };

            if (question.img) {
                img.style.display = 'block';
                img.src = question.img;
                img.alt = `${question.name} のしゃしん`;
            } else {
                loadingText.style.display = 'none';
                errorText.style.display = 'block';
                img.style.display = 'none';
            }
        }

        function fireConfetti() {
            confetti({
                particleCount: 120,
                spread: 80,
                origin: { y: 0.6 }
            });
        }

        function showFeedback(isCorrect) {
            const overlay = document.getElementById('feedback-overlay');
            const mark = document.getElementById('feedback-mark');
            overlay.style.visibility = 'visible';
            mark.className = 'feedback-mark';
            mark.textContent = isCorrect ? '○' : '✕';
            mark.classList.add(isCorrect ? 'correct' : 'wrong');
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
                mark.className = 'feedback-mark';
            }, 1000);
        }

        function selectAnswer(selected, correct) {
            if (isAnimating) return;
            isAnimating = true;

            const buttons = [...document.querySelectorAll('.option-btn')];
            const isCorrect = selected === correct;

            if (isCorrect) {
                score++;
                document.getElementById('score').textContent = score;
                fireConfetti();
            }

            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === correct) {
                    btn.classList.add('correct-highlight');
                } else if (btn.textContent === selected && !isCorrect) {
                    btn.classList.add('wrong-highlight');
                } else if (!isCorrect) {
                    btn.classList.add('wrong-highlight');
                }
            });

            showFeedback(isCorrect);

            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, 1300);
        }

        // --- ゲーム開始 ---

        async function startGame(mode) {
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById('score').textContent = score;

            currentDataset = mode === 'dog' ? dogData : animalData;

            // ローディング画面を表示して画像を並列取得
            switchScreen('loading-screen');
            await loadImages(currentDataset);

            // 画像が取得できたものだけでクイズを構成
            const validItems = currentDataset.filter(item => item.img);
            if (validItems.length < 4) {
                alert('しゃしんが よみこめませんでした。\nインターネットに つないでいるか かくにんしてね。');
                switchScreen('start-screen');
                return;
            }

            quizList = shuffleArray(validItems).slice(0, Math.min(10, validItems.length));
            switchScreen('quiz-screen');
            showQuestion();
        }

        // --- 結果表示 ---

        function getResultMessage(finalScore) {
            if (finalScore === 10) return "すごーい！ ぜんもんせいかい！ もふもふはかせだね！";
            if (finalScore >= 8) return "すごい！ とっても じょうずに できたね！";
            if (finalScore >= 5) return "がんばったね！ たくさん あてられたよ！";
            if (finalScore >= 3) return "よくできました！ もういちど ちょうせんしてみよう！";
            return "がんばったね！ つぎは もっと あてられるよ！";
        }

        function showResult() {
            document.getElementById('final-score-text').textContent = `${score} / ${quizList.length}`;
            document.getElementById('result-message').textContent = getResultMessage(score);
            switchScreen('result-screen');
        }

        function goToStart() {
            switchScreen('start-screen');
        }

        // --- 起動 ---
        loadHeroImage();
    </script>
</body>
</html>
