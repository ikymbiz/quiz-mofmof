<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>もふもふクイズ</title>
    <!-- 子供向けの丸みを帯びたポップなフォント -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
    <!-- 正解時の紙吹雪アニメーション用ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-bg: #FFE5E5;
            --card-bg: #FFFFFF;
            --text-main: #5D4037;
            --btn-yellow: #FFCA28;
            --btn-blue: #29B6F6;
            --btn-green: #66BB6A;
            --btn-pink: #EC407A;
            --shadow-color: rgba(93, 64, 55, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none;
            touch-action: manipulation; /* スマホでのダブルタップズーム防止 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-bg);
            background-image: radial-gradient(#FFCDD2 3px, transparent 3px);
            background-size: 40px 40px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 15px;
        }

        #app {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 40px;
            box-shadow: 0 15px 35px var(--shadow-color);
            padding: 40px 25px;
            text-align: center;
            position: relative;
            border: 4px solid #FFF;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: block;
        }

        /* スタート画面 */
        .title {
            font-size: 3.5rem;
            color: var(--btn-pink);
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 3px 3px 0px #FFF, 6px 6px 0px rgba(0,0,0,0.05);
        }

        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #8D6E63;
        }

        .hero-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 10px solid var(--btn-yellow);
            margin-bottom: 25px;
            box-shadow: 0 10px 20px var(--shadow-color);
        }

        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .start-btn {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            padding: 18px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 2px;
        }

        .btn-animal {
            background-color: var(--btn-yellow);
            box-shadow: 0 8px 0 #F57F17, 0 15px 20px rgba(245, 127, 23, 0.4);
        }
        .btn-animal:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #F57F17, 0 5px 10px rgba(245, 127, 23, 0.4);
        }

        .btn-dog {
            background-color: var(--btn-blue);
            box-shadow: 0 8px 0 #0288D1, 0 15px 20px rgba(2, 136, 209, 0.4);
        }
        .btn-dog:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #0288D1, 0 5px 10px rgba(2, 136, 209, 0.4);
        }

        /* クイズ画面 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .question-number {
            background-color: var(--btn-yellow);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 0 #F57F17;
        }

        .score-display {
            color: var(--btn-pink);
            background-color: #FCE4EC;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .animal-img-container {
            width: 100%;
            height: 260px;
            margin-bottom: 20px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 20px var(--shadow-color);
            background-color: #F5F5F5;
            position: relative;
            border: 4px solid #FFF;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #BCAAA4;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1;
        }

        .error-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #E53935;
            font-size: 1rem;
            font-weight: bold;
            z-index: 1;
            display: none;
            width: 100%;
            text-align: center;
        }

        .animal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        .animal-img.loaded {
            opacity: 1;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
            padding: 18px 5px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s;
            position: relative;
            overflow: hidden;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15);
        }

        /* 選択肢のカラーバリエーション */
        .option-btn:nth-child(1) { background-color: var(--btn-blue); box-shadow: 0 8px 0 #0288D1; }
        .option-btn:nth-child(2) { background-color: var(--btn-green); box-shadow: 0 8px 0 #388E3C; }
        .option-btn:nth-child(3) { background-color: var(--btn-yellow); box-shadow: 0 8px 0 #F57F17; }
        .option-btn:nth-child(4) { background-color: var(--btn-pink); box-shadow: 0 8px 0 #C2185B; }

        .option-btn:nth-child(1):active { box-shadow: 0 0 0 #0288D1; }
        .option-btn:nth-child(2):active { box-shadow: 0 0 0 #388E3C; }
        .option-btn:nth-child(3):active { box-shadow: 0 0 0 #F57F17; }
        .option-btn:nth-child(4):active { box-shadow: 0 0 0 #C2185B; }

        /* 正解・不正解時のハイライト */
        .correct-highlight {
            animation: correctPulse 1s infinite;
            z-index: 10;
        }

        .wrong-highlight {
            opacity: 0.4;
            transform: scale(0.95);
        }

        /* リザルト画面 */
        .result-title {
            font-size: 2.8rem;
            margin-bottom: 20px;
            color: var(--btn-blue);
        }

        .final-score {
            font-size: 5.5rem;
            color: var(--btn-pink);
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #FFF;
        }

        .result-msg {
            font-size: 1.5rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .back-btn {
            background-color: var(--btn-green);
            box-shadow: 0 8px 0 #388E3C, 0 15px 20px rgba(56, 142, 60, 0.4);
            margin: 0 auto;
        }
        .back-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #388E3C, 0 5px 10px rgba(56, 142, 60, 0.4);
        }

        /* アニメーション用オーバーレイ */
        #feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 100;
            visibility: hidden;
        }

        .feedback-mark {
            font-size: 15rem;
            font-weight: bold;
            opacity: 0;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .feedback-mark.correct {
            color: #FF5252;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .feedback-mark.wrong {
            color: #424242;
            animation: dropShake 1s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.3) rotate(-20deg); }
            40% { opacity: 1; transform: scale(1.2) rotate(10deg); }
            80% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(1); }
        }

        @keyframes dropShake {
            0% { opacity: 0; transform: scale(1.5) translateY(-50px); }
            20% { opacity: 1; transform: scale(1) translateY(0); }
            40% { transform: translateX(-20px) rotate(-10deg); }
            60% { transform: translateX(20px) rotate(10deg); }
            80% { transform: translateX(-10px) rotate(-5deg); }
            100% { opacity: 0; transform: translateX(0) rotate(0); }
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @media (max-width: 480px) {
            .title { font-size: 3rem; }
            .hero-img { width: 180px; height: 180px; margin-bottom: 20px; }
            .animal-img-container { height: 220px; }
            .option-btn { font-size: 1.2rem; padding: 15px 5px; }
            .header { font-size: 1.1rem; }
            .start-btn { font-size: 1.3rem; padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- スタート画面 -->
        <div id="start-screen" class="screen active">
            <h1 class="title">もふもふ<br>クイズ</h1>
            <p class="subtitle">しゃしんをみて なまえを あててね！<br>ぜんぶで 10もん あるよ🐾</p>
            
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Cat_November_2010-1a.jpg/500px-Cat_November_2010-1a.jpg" alt="もふもふ猫" class="hero-img">
            
            <div class="mode-select">
                <button class="start-btn btn-animal" onclick="startGame('animal')">
                    🐱 どうぶつ
                </button>
                <button class="start-btn btn-dog" onclick="startGame('dog')">
                    🐶 いぬのしゅるい
                </button>
            </div>
        </div>

        <!-- クイズ画面 -->
        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="question-number">だい いち もん</div>
                <div class="score-display">スコア: <span id="score">0</span></div>
            </div>
            
            <div class="animal-img-container">
                <div id="loading-text" class="loading-text">しゃしんを<br>よみこみちゅう...</div>
                <div id="error-text" class="error-text">しゃしんが でないよ<br>もういちど やってみてね</div>
                <img id="question-img" class="animal-img" src="" alt="クイズのしゃしん">
            </div>

            <div class="options" id="options-container">
                <!-- ボタンはJSで生成 -->
            </div>
        </div>

        <!-- リザルト画面 -->
        <div id="result-screen" class="screen">
            <h2 class="result-title">けっかは...</h2>
            <div class="final-score" id="final-score-text">0 / 10</div>
            <p class="result-msg" id="result-message">がんばったね！</p>
            <button class="start-btn back-btn" onclick="goToStart()">さいしょに もどる</button>
        </div>
    </div>

    <!-- 正解/不正解のアニメーション用 -->
    <div id="feedback-overlay">
        <div id="feedback-mark" class="feedback-mark"></div>
    </div>

    <script>
        // 画像リンク切れや不一致を防ぐため、安定したWikipedia(Wikimedia Commons)の画像に変更
        // 小さな女の子が好きそうな「もふもふ動物」を正確に設定
        const animalQuizData = [
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Cat_November_2010-1a.jpg/500px-Cat_November_2010-1a.jpg', answer: 'ねこ', wrong: ['いぬ', 'うさぎ', 'たぬき'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Oryctolagus_cuniculus_Rcdo.jpg/500px-Oryctolagus_cuniculus_Rcdo.jpg', answer: 'うさぎ', wrong: ['ねずみ', 'いぬ', 'はむすたー'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Grosser_Panda.JPG/500px-Grosser_Panda.JPG', answer: 'ぱんだ', wrong: ['しろくま', 'こあら', 'あらいぐま'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/George_the_amazing_guinea_pig.jpg/500px-George_the_amazing_guinea_pig.jpg', answer: 'もるもっと', wrong: ['はむすたー', 'うさぎ', 'ねずみ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Sciurus_vulgaris_-_M%C3%BCnchen.jpg/500px-Sciurus_vulgaris_-_M%C3%BCnchen.jpg', answer: 'りす', wrong: ['ねずみ', 'ももんが', 'きつね'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Dwarf_hamster.jpg/500px-Dwarf_hamster.jpg', answer: 'はむすたー', wrong: ['ねずみ', 'もるもっと', 'うさぎ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Ailurus_fulgens_in_Plze%C5%88_Zoo_%2805%29.jpg/500px-Ailurus_fulgens_in_Plze%C5%88_Zoo_%2805%29.jpg', answer: 'れっさーぱんだ', wrong: ['あらいぐま', 'ぱんだ', 'きつね'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Flock_of_sheep.jpg/500px-Flock_of_sheep.jpg', answer: 'ひつじ', wrong: ["あるぱか", 'やぎ', 'うし'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Alpaca_%2831562329701%29.jpg/500px-Alpaca_%2831562329701%29.jpg', answer: 'あるぱか', wrong: ['ひつじ', 'らくだ', 'やぎ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Fox_-_British_Wildlife_Centre_%2817429406401%29.jpg/500px-Fox_-_British_Wildlife_Centre_%2817429406401%29.jpg', answer: 'きつね', wrong: ['いぬ', 'たぬき', 'おおかみ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Wolf_running_in_snow.jpg/500px-Wolf_running_in_snow.jpg', answer: 'おおかみ', wrong: ['いぬ', 'きつね', 'たぬき'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Raccoon_in_Central_Park_%2871987%29.jpg/500px-Raccoon_in_Central_Park_%2871987%29.jpg', answer: 'あらいぐま', wrong: ['たぬき', 'れっさーぱんだ', 'くま'] }
        ];

        // 犬の種類クイズデータ（正確な犬種画像をWikipediaから取得）
        const dogQuizData = [
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Pomeranian_Dog.jpg/500px-Pomeranian_Dog.jpg', answer: 'ぽめらにあん', wrong: ['といぷーどる', 'ちわわ', 'まるちーず'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Toy_Poodle.jpg/500px-Toy_Poodle.jpg', answer: 'といぷーどる', wrong: ['ぽめらにあん', 'まるちーず', 'びしょんふりぜ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Shiba_Inu_Taiki.jpg/500px-Shiba_Inu_Taiki.jpg', answer: 'しばいぬ', wrong: ['あきたけん', 'こーぎー', 'ぽめらにあん'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Chihuahua1_bvdb.jpg/500px-Chihuahua1_bvdb.jpg', answer: 'ちわわ', wrong: ['ぱぴよん', 'ぽめらにあん', 'だっくすふんど'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Golden_Retriever_with_tennis_ball.jpg/500px-Golden_Retriever_with_tennis_ball.jpg', answer: 'ごーるでん', wrong: ['らぶらどーる', 'しばいぬ', 'こーぎー'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Short-haired-Dachshund.jpg/500px-Short-haired-Dachshund.jpg', answer: 'だっくすふんど', wrong: ['こーぎー', 'ちわわ', 'びーぐる'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Sad-pug.jpg/500px-Sad-pug.jpg', answer: 'ぱぐ', wrong: ['ふれんちぶる', 'ぶるどっぐ', 'ぼすとんてりあ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/French_Bulldog_222.jpg/500px-French_Bulldog_222.jpg', answer: 'ふれんちぶる', wrong: ['ぱぐ', 'ぶるどっぐ', 'ちわわ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Welchcorgipembroke.JPG/500px-Welchcorgipembroke.JPG', answer: 'こーぎー', wrong: ['しばいぬ', 'だっくすふんど', 'びーぐる'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Maltese_dog.jpg/500px-Maltese_dog.jpg', answer: 'まるちーず', wrong: ['といぷーどる', 'ぽめらにあん', 'ちわわ'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Akita_inu_in_Riga_1.JPG/500px-Akita_inu_in_Riga_1.JPG', answer: 'あきたけん', wrong: ['しばいぬ', 'ごーるでん', 'こーぎー'] },
            { img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Beagle_600.jpg/500px-Beagle_600.jpg', answer: 'びーぐる', wrong: ['だっくすふんど', 'こーぎー', 'ぱぐ'] }
        ];

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnimating = false;

        // 漢数字への変換マスタ
        const kanjiNumbers = ['いち', 'に', 'さん', 'よん', 'ご', 'ろく', 'なな', 'はち', 'きゅう', 'じゅう'];

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // 配列のシャッフル（Fisher-Yatesアルゴリズムで完全にランダム化）
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startGame(mode) {
            score = 0;
            currentQuestionIndex = 0;
            
            // モードによって問題を切り替え、全体をシャッフルしてから最初の10問を取得
            if (mode === 'dog') {
                currentQuestions = shuffleArray(dogQuizData).slice(0, 10);
                document.querySelector('.question-number').style.backgroundColor = 'var(--btn-blue)';
                document.querySelector('.question-number').style.boxShadow = '0 4px 0 #0288D1';
            } else {
                currentQuestions = shuffleArray(animalQuizData).slice(0, 10);
                document.querySelector('.question-number').style.backgroundColor = 'var(--btn-yellow)';
                document.querySelector('.question-number').style.boxShadow = '0 4px 0 #F57F17';
            }
            
            document.getElementById('score').innerText = score;
            
            loadQuestion();
            switchScreen('quiz-screen');
        }

        function loadQuestion() {
            isAnimating = false;
            const q = currentQuestions[currentQuestionIndex];
            
            // ヘッダー更新
            document.querySelector('.question-number').innerText = `だい ${kanjiNumbers[currentQuestionIndex]} もん`;
            
            // 画像の読み込み処理
            const imgEl = document.getElementById('question-img');
            const loadingText = document.getElementById('loading-text');
            const errorText = document.getElementById('error-text');
            
            imgEl.className = 'animal-img'; // loadedクラスを外して非表示に
            loadingText.style.display = 'block'; // ローディング文字を表示
            errorText.style.display = 'none';
            
            imgEl.onload = () => {
                imgEl.classList.add('loaded'); // フェードイン
                loadingText.style.display = 'none';
                preloadNextImage(); // 次の画像を裏で読み込んでおく
            };
            
            imgEl.onerror = () => {
                loadingText.style.display = 'none';
                errorText.style.display = 'block';
            };

            // 画像URLをセットして読み込み開始
            imgEl.src = q.img;

            // 選択肢もランダムにシャッフルして生成
            const options = shuffleArray([q.answer, ...q.wrong]);
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optionText;
                btn.onclick = () => checkAnswer(optionText, q.answer, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // 次の画像を事前読み込みして待ち時間を減らす
        function preloadNextImage() {
            if (currentQuestionIndex + 1 < currentQuestions.length) {
                const img = new Image();
                img.src = currentQuestions[currentQuestionIndex + 1].img;
            }
        }

        function checkAnswer(selected, correct, selectedBtn) {
            if (isAnimating) return; // アニメーション中の連打防止
            isAnimating = true;

            const isCorrect = selected === correct;
            
            // ボタンのハイライト演出
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.innerText === correct) {
                    btn.classList.add('correct-highlight'); // 正解をピカピカさせる
                } else if (btn === selectedBtn && !isCorrect) {
                    btn.classList.add('wrong-highlight'); // 間違えたボタンを暗くする
                } else if (!isCorrect) {
                    btn.classList.add('wrong-highlight'); // 他のボタンも暗くする
                }
            });

            showFeedback(isCorrect);

            if (isCorrect) {
                score++;
                document.getElementById('score').innerText = score;
                triggerConfetti();
            }

            // 少し待ってから次の問題へ
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < currentQuestions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1500); 
        }

        function showFeedback(isCorrect) {
            const overlay = document.getElementById('feedback-overlay');
            const mark = document.getElementById('feedback-mark');
            
            overlay.style.visibility = 'visible';
            
            if (isCorrect) {
                mark.innerText = '⭕️';
                mark.className = 'feedback-mark correct';
            } else {
                mark.innerText = '❌';
                mark.className = 'feedback-mark wrong';
            }

            // アニメーション終了後にリセット
            setTimeout(() => {
                mark.className = 'feedback-mark';
                overlay.style.visibility = 'hidden';
            }, 1000);
        }

        function triggerConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FFCA28', '#29B6F6', '#66BB6A', '#EC407A', '#ffffff'],
                disableForReducedMotion: true,
                zIndex: 1000
            });
        }

        function showResult() {
            document.getElementById('final-score-text').innerText = `${score} / 10`;
            
            let msg = '';
            if (score === 10) {
                msg = 'まんてん！✨\nもふもふマスター だね！🎉';
                setTimeout(() => {
                    triggerConfetti();
                    setTimeout(triggerConfetti, 400);
                    setTimeout(triggerConfetti, 800);
                }, 500);
            } else if (score >= 7) {
                msg = 'すごい！\nよくできました！💕';
                setTimeout(triggerConfetti, 500);
            } else if (score >= 4) {
                msg = 'がんばったね！\nもうすこし！🌟';
            } else {
                msg = 'また ちょうせん\nしてみてね！🐾';
            }
            
            // 改行を反映
            document.getElementById('result-message').innerHTML = msg.replace(/\n/g, '<br>');
            switchScreen('result-screen');
        }

        function goToStart() {
            switchScreen('start-screen');
        }
    </script>
</body>
</html>
